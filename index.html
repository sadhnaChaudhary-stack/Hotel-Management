<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Hotel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">Avalon</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Rooms</a>
    <a href="#">Services</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>
  <button class="book-btn">Book Now</button>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h4>WELCOME TO LUXURY</h4>
    <h1>The Ultimate Luxury Hotel Experience</h1>
    <p>Enjoy world-class comfort and premium services</p>

    <div class="hero-buttons">
      <button class="btn-primary">Explore Rooms</button>
      <button class="btn-secondary">Watch Video</button>
    </div>
  </div>

  <!-- BOOKING BAR -->
  <div class="booking-bar">
    <div class="field">
      <label>Check In</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Check Out</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Rooms</label>
      <select>
        <option>1 Room</option>
        <option>2 Rooms</option>
      </select>
    </div>

    <div class="field">
      <label>Guests</label>
      <select>
        <option>1 Adult</option>
        <option>2 Adults</option>
      </select>
    </div>

    <button class="search-btn">Check Availability</button>
  </div>

</section>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</body>
</html>
